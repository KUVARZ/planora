  # ----------------------------- VA

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: planora_session
      description: >
        PLANORA web oturumu için kullanılan birincil session cookie.

    CsrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: >
        Cookie tabanlı ve state-changing (POST/PUT/PATCH/DELETE) isteklerde
        kullanılan CSRF token başlığı. Public veya salt-read endpointlerde
        zorunlu değildir.

  parameters:
    XCsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: State-changing cookie-auth isteklerinde gönderilen CSRF token.
      schema:
        type: string
        minLength: 16

    FavoriteId:
      name: favoriteId
      in: path
      required: true
      description: Silinecek favori kaydının kimliği.
      schema:
        type: string
        format: uuid

    FavoriteTypeFilter:
      name: type
      in: query
      required: false
      description: Favori listesini belirli bir hedef tipine göre filtreler.
      schema:
        $ref: '#/components/schemas/FavoriteTargetType'

    PaginationLimit:
      name: limit
      in: query
      required: false
      description: Döndürülecek maksimum kayıt sayısı.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    PaginationCursor:
      name: cursor
      in: query
      required: false
      description: Cursor tabanlı sayfalama için işaretçi.
      schema:
        type: string

    # -------------------------- RB

    UsernameQuery:
      name: username
      in: query
      required: true
      description: Uygunluğu kontrol edilecek kullanıcı adı.
      schema:
        type: string
        minLength: 3
        maxLength: 32
        pattern: '^[a-zA-Z0-9._-]+$'

    PlanId:
      name: planId
      in: path
      required: true
      description: Takvim planı kimliği.
      schema:
        type: string
        format: uuid

    CalendarView:
      name: view
      in: query
      required: false
      description: Takvim görünüm seviyesi.
      schema:
        type: string
        enum: [ day, week, month ]
        default: month

    CalendarDate:
      name: date
      in: query
      required: false
      description: >
        Tekil tarih odaklı görünüm için referans tarih.
        `view=day|week|month` ile birlikte kullanılabilir.
      schema:
        type: string
        format: date

    CalendarFrom:
      name: from
      in: query
      required: false
      description: Listeleme için başlangıç tarihi.
      schema:
        type: string
        format: date

    CalendarTo:
      name: to
      in: query
      required: false
      description: Listeleme için bitiş tarihi.
      schema:
        type: string
        format: date

    CalendarRouteId:
      name: routeId
      in: query
      required: false
      description: Takvim planlarını belirli bir route için filtreler.
      schema:
        type: string
        format: uuid

    # ------------------------ ZA

    RouteId:
      name: routeId
      in: path
      required: true
      description: İşlem yapılacak rota kimliği.
      schema:
        type: string
        format: uuid

    RouteStatusFilter:
      name: status
      in: query
      required: false
      description: Rotaları durum bilgisine göre filtreler.
      schema:
        $ref: '#/components/schemas/RouteStatus'

    RouteDestinationCityFilter:
      name: destinationCity
      in: query
      required: false
      description: Belirli bir şehir için rota listesi filtreleme.
      schema:
        type: string
        maxLength: 120

    RouteFromDate:
      name: from
      in: query
      required: false
      description: Planlanan rota tarih aralığı için başlangıç tarihi.
      schema:
        type: string
        format: date

    RouteToDate:
      name: to
      in: query
      required: false
      description: Planlanan rota tarih aralığı için bitiş tarihi.
      schema:
        type: string
        format: date

    NotificationId:
      name: notifId
      in: path
      required: true
      description: Silinecek bildirim kimliği.
      schema:
        type: string
        format: uuid

    NotificationTypeFilter:
      name: type
      in: query
      required: false
      description: Bildirim tipine göre filtreleme.
      schema:
        $ref: '#/components/schemas/NotificationType'

    NotificationSourceFilter:
      name: source
      in: query
      required: false
      description: Bildirim kaynağına göre filtreleme.
      schema:
        $ref: '#/components/schemas/NotificationSource'

    NotificationReadFilter:
      name: isRead
      in: query
      required: false
      description: Okunma durumuna göre filtreleme.
      schema:
        type: boolean

    # ---------------------- AL

    PreferenceId:
      name: prefId
      in: path
      required: true
      description: İşlem yapılacak preference kaydının kimliği.
      schema:
        type: string
        format: uuid

    PreferenceScopeFilter:
      name: scope
      in: query
      required: false
      description: Preference kayıtlarını kapsamına göre filtreler.
      schema:
        $ref: '#/components/schemas/PreferenceScope'

    PreferenceDefaultFilter:
      name: isDefault
      in: query
      required: false
      description: Varsayılan preference kaydını filtreler.
      schema:
        type: boolean

    RoutePlaceId:
      name: placeId
      in: path
      required: true
      description: İşlem yapılacak rota içi gezi noktası kimliği.
      schema:
        type: string
        format: uuid

    # ---------------------- VA

  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      additionalProperties: false
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z0-9._-]+$'
          description: Benzersiz kullanıcı adı.
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: >
            Güçlü parola. Sunucu tarafında karmaşıklık kuralları ayrıca uygulanabilir.
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        birthDate:
          type: string
          format: date

    RegisterResponse:
      type: object
      required:
        - user
        - meta
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        meta:
          type: object
          required:
            - registeredAt
            - twoFactorEnabled
          properties:
            registeredAt:
              type: string
              format: date-time
            twoFactorEnabled:
              type: boolean
              default: false

    UserSummary:
      type: object
      required:
        - id
        - username
        - email
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ProfileResponse:
      type: object
      required:
        - user
      properties:
        user:
          allOf:
            - $ref: '#/components/schemas/UserSummary'
            - type: object
              properties:
                twoFactorEnabled:
                  type: boolean
                preferencesCount:
                  type: integer
                  minimum: 0
                favoritesCount:
                  type: integer
                  minimum: 0

    UpdateProfileRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        birthDate:
          type: string
          format: date
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-zA-Z0-9._-]+$'
          description: >
            Desteklenecekse güncellenebilir; desteklenmeyecekse server bunu reddedebilir.
      description: >
        Profil alanlarının kısmi güncellemesi için istek gövdesi.

    CreateTwoFactorRequest:
      type: object
      required:
        - method
      additionalProperties: false
      properties:
        method:
          type: string
          enum: [totp]
          description: >
            Şimdilik en mantıklı yöntem TOTP. SMS/e-posta 2FA ileride eklenebilir.
        issuer:
          type: string
          default: PLANORA
        accountLabel:
          type: string
          description: Authenticator uygulamasında görünen hesap etiketi.

    UpdateTwoFactorRequest:
      type: object
      required:
        - action
      additionalProperties: false
      properties:
        action:
          type: string
          enum: [rotate, reconfigure, replace]
        currentOtpCode:
          type: string
          pattern: '^[0-9]{6,8}$'
          description: >
            Mevcut 2FA yöntemini doğrulamak için istenebilir.
        newMethod:
          type: string
          enum: [totp]
        issuer:
          type: string
        accountLabel:
          type: string
        passwordConfirmation:
          type: string
          format: password
          description: Step-up authentication için ek doğrulama alanı.

    TwoFactorSetupResponse:
      type: object
      required:
        - method
        - status
        - secret
        - otpauthUrl
      properties:
        method:
          type: string
          enum: [totp]
        status:
          type: string
          enum: [pending_verification, enabled]
        secret:
          type: string
          description: >
            Base32 gibi bir formatta paylaşılan TOTP sırrı.
        otpauthUrl:
          type: string
          format: uri
        qrCodeDataUrl:
          type: string
          description: İstemci QR render edecekse veri URI olarak dönebilir.
        recoveryCodes:
          type: array
          description: >
            İleride desteklenmesi çok faydalı olur; şimdiden şemaya koymak kötü fikir değil.
          items:
            type: string
        updatedAt:
          type: string
          format: date-time

    FavoriteTargetType:
      type: string
      enum:
        - place
        - activity
        - trip_plan
        - route

    CreateFavoriteRequest:
      type: object
      required:
        - targetType
        - targetId
      additionalProperties: false
      properties:
        targetType:
          $ref: '#/components/schemas/FavoriteTargetType'
        targetId:
          type: string
          description: >
            Favoriye eklenecek hedef kaynağın kimliği.
        note:
          type: string
          maxLength: 500
          description: Kullanıcının favori için kısa notu.
        snapshot:
          $ref: '#/components/schemas/FavoriteSnapshotInput'

    FavoriteSnapshotInput:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 200
        subtitle:
          type: string
          maxLength: 200
        city:
          type: string
          maxLength: 120
        imageUrl:
          type: string
          format: uri

    Favorite:
      type: object
      required:
        - id
        - userId
        - targetType
        - targetId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        targetType:
          $ref: '#/components/schemas/FavoriteTargetType'
        targetId:
          type: string
        note:
          type: string
          nullable: true
        snapshot:
          allOf:
            - $ref: '#/components/schemas/FavoriteSnapshotInput'
            - nullable: true
        createdAt:
          type: string
          format: date-time

    FavoriteResponse:
      type: object
      required:
        - favorite
      properties:
        favorite:
          $ref: '#/components/schemas/Favorite'

    FavoriteListResponse:
      type: object
      required:
        - items
        - pageInfo
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Favorite'
        pageInfo:
          $ref: '#/components/schemas/CursorPageInfo'

    CursorPageInfo:
      type: object
      required:
        - hasNextPage
      properties:
        nextCursor:
          type: string
          nullable: true
        hasNextPage:
          type: boolean

    TripRecommendationRequest:
      type: object
      required:
        - destination
        - tripPurpose
        - duration
      additionalProperties: false
      properties:
        destination:
          $ref: '#/components/schemas/DestinationInput'
        tripPurpose:
          type: string
          enum:
            - cultural
            - nature
            - entertainment
            - gastronomy
            - relaxation
            - mixed
        budget:
          $ref: '#/components/schemas/BudgetInput'
        duration:
          $ref: '#/components/schemas/DurationInput'
        dateRange:
          $ref: '#/components/schemas/DateRange'
        travelerProfile:
          $ref: '#/components/schemas/TravelerProfileInput'
        preferenceIds:
          type: array
          description: >
            Kullanıcının kayıtlı preference kayıtlarından özellikle kullanılmasını istediği ID listesi.
          items:
            type: string
            format: uuid
        includeUserPreferences:
          type: boolean
          default: true
        constraints:
          $ref: '#/components/schemas/TripRecommendationConstraints'

    DestinationInput:
      type: object
      required:
        - city
      additionalProperties: false
      properties:
        city:
          type: string
          maxLength: 120
        country:
          type: string
          maxLength: 120
        coordinates:
          $ref: '#/components/schemas/Coordinates'

    Coordinates:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180

    BudgetInput:
      type: object
      additionalProperties: false
      properties:
        level:
          type: string
          enum: [low, medium, high, luxury]
        currency:
          type: string
          minLength: 3
          maxLength: 3
        minAmount:
          type: number
          minimum: 0
        maxAmount:
          type: number
          minimum: 0

    DurationInput:
      type: object
      additionalProperties: false
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 90
        nights:
          type: integer
          minimum: 0
          maximum: 89

    DateRange:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    TravelerProfileInput:
      type: object
      additionalProperties: false
      properties:
        travelersCount:
          type: integer
          minimum: 1
          maximum: 20
        companions:
          type: array
          items:
            type: string
            enum: [solo, partner, family, friends, business]
        pace:
          type: string
          enum: [slow, balanced, intense]
        accessibilityNeeds:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string

    TripRecommendationConstraints:
      type: object
      additionalProperties: false
      properties:
        maxDailyStops:
          type: integer
          minimum: 1
          maximum: 20
        avoidCategories:
          type: array
          items:
            type: string
        preferredCategories:
          type: array
          items:
            type: string
        indoorOnly:
          type: boolean
        outdoorOnly:
          type: boolean
        transportPreference:
          type: string
          enum: [walking, public_transport, taxi, rental_car, mixed]

    TripRecommendationResponse:
      type: object
      required:
        - recommendationId
        - destination
        - summary
        - suggestedPlaces
        - dailyDraftPlans
        - routeIdeas
        - notes
        - meta
      properties:
        recommendationId:
          type: string
          format: uuid
        destination:
          $ref: '#/components/schemas/DestinationInput'
        summary:
          type: string
          description: AI tarafından üretilen genel gezi özeti.
        suggestedPlaces:
          type: array
          items:
            $ref: '#/components/schemas/SuggestedPlace'
        dailyDraftPlans:
          type: array
          items:
            $ref: '#/components/schemas/DailyDraftPlan'
        routeIdeas:
          type: array
          items:
            $ref: '#/components/schemas/RouteIdea'
        notes:
          type: array
          items:
            type: string
        meta:
          $ref: '#/components/schemas/AIGenerationMeta'

    SuggestedPlace:
      type: object
      required:
        - name
        - category
      properties:
        name:
          type: string
        category:
          type: string
        city:
          type: string
        estimatedVisitMinutes:
          type: integer
          minimum: 1
        reason:
          type: string
        approximateCost:
          type: number
          minimum: 0

    DailyDraftPlan:
      type: object
      required:
        - dayNumber
        - title
        - items
      properties:
        dayNumber:
          type: integer
          minimum: 1
        title:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/DailyDraftItem'

    DailyDraftItem:
      type: object
      required:
        - label
      properties:
        startTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        endTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        label:
          type: string
        category:
          type: string
        note:
          type: string

    RouteIdea:
      type: object
      required:
        - title
        - stops
      properties:
        title:
          type: string
        description:
          type: string
        stops:
          type: array
          items:
            type: string
        estimatedTotalMinutes:
          type: integer
          minimum: 1

    AIGenerationMeta:
      type: object
      required:
        - generatedAt
      properties:
        generatedAt:
          type: string
          format: date-time
        provider:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        usedExternalData:
          type: boolean
        usedPreferenceIds:
          type: array
          items:
            type: string
            format: uuid
        warnings:
          type: array
          items:
            type: string

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        traceId:
          type: string
          nullable: true

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
        issue:
          type: string
        value:
          nullable: true

    # -------------------------- RB

    LoginRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
        otpCode:
          type: string
          pattern: '^[0-9]{6,8}$'
          description: >
            İkinci faktör gerekiyorsa gönderilir.
        rememberMe:
          type: boolean
          default: false

    LoginSuccessResponse:
      type: object
      required:
        - status
        - user
        - session
      properties:
        status:
          type: string
          enum: [ authenticated ]
        user:
          $ref: '#/components/schemas/UserSummary'
        session:
          $ref: '#/components/schemas/SessionInfo'

    LoginRequiresTwoFactorResponse:
      type: object
      required:
        - status
        - challenge
      properties:
        status:
          type: string
          enum: [ 2fa_required ]
        challenge:
          $ref: '#/components/schemas/TwoFactorChallenge'

    SessionInfo:
      type: object
      required:
        - issuedAt
        - expiresAt
      properties:
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        rememberMe:
          type: boolean
        sessionType:
          type: string
          enum: [ cookie ]

    TwoFactorChallenge:
      type: object
      required:
        - method
        - message
      properties:
        method:
          type: string
          enum: [ totp ]
        message:
          type: string
        challengeId:
          type: string
          nullable: true

    PasswordResetRequest:
      oneOf:
        - $ref: '#/components/schemas/PasswordResetInitiateRequest'
        - $ref: '#/components/schemas/PasswordResetConfirmRequest'
      discriminator:
        propertyName: action
        mapping:
          request_reset: '#/components/schemas/PasswordResetInitiateRequest'
          confirm_reset: '#/components/schemas/PasswordResetConfirmRequest'

    PasswordResetInitiateRequest:
      type: object
      required:
        - action
        - email
      additionalProperties: false
      properties:
        action:
          type: string
          enum: [ request_reset ]
        email:
          type: string
          format: email

    PasswordResetConfirmRequest:
      type: object
      required:
        - action
        - email
        - resetToken
        - newPassword
      additionalProperties: false
      properties:
        action:
          type: string
          enum: [ confirm_reset ]
        email:
          type: string
          format: email
        resetToken:
          type: string
          minLength: 8
          description: >
            E-posta bağlantısı, tek kullanımlık token veya doğrulama kodu.
        newPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 128
        otpCode:
          type: string
          pattern: '^[0-9]{4,8}$'
          nullable: true
          description: >
            Akış çok adımlıysa ek doğrulama kodu.

    PasswordResetInitiateResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum: [ reset_requested ]
        message:
          type: string
        expiresInMinutes:
          type: integer
          minimum: 1
          nullable: true

    PasswordResetConfirmResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum: [ password_updated ]
        message:
          type: string
        updatedAt:
          type: string
          format: date-time

    UsernameCheckResponse:
      type: object
      required:
        - username
        - normalizedUsername
        - available
      properties:
        username:
          type: string
        normalizedUsername:
          type: string
        available:
          type: boolean
        reason:
          type: string
          enum:
            - available
            - already_taken
            - reserved
            - invalid_format
            - too_short
            - too_long
          nullable: true
        suggestions:
          type: array
          items:
            type: string
          maxItems: 5

    CreateCalendarPlanRequest:
      type: object
      required:
        - routeId
        - date
        - startTime
        - endTime
      additionalProperties: false
      properties:
        routeId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        startTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        endTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        title:
          type: string
          maxLength: 200
        place:
          $ref: '#/components/schemas/CalendarPlaceInput'
        activity:
          $ref: '#/components/schemas/CalendarActivityInput'
        notes:
          type: string
          maxLength: 2000
        sourceType:
          type: string
          enum: [ manual, ai_suggested, imported ]
          default: manual
        relatedRecommendationIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateCalendarPlanRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        routeId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        startTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        endTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        title:
          type: string
          maxLength: 200
        place:
          $ref: '#/components/schemas/CalendarPlaceInput'
        activity:
          $ref: '#/components/schemas/CalendarActivityInput'
        notes:
          type: string
          maxLength: 2000
        sourceType:
          type: string
          enum: [ manual, ai_suggested, imported ]
        relatedRecommendationIds:
          type: array
          items:
            type: string
            format: uuid

    CalendarPlaceInput:
      type: object
      additionalProperties: false
      properties:
        placeId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          maxLength: 200
        address:
          type: string
          maxLength: 500
        city:
          type: string
          maxLength: 120
        coordinates:
          $ref: '#/components/schemas/Coordinates'

    CalendarActivityInput:
      type: object
      additionalProperties: false
      properties:
        activityId:
          type: string
          format: uuid
          nullable: true
        category:
          type: string
          enum:
            - cultural
            - entertainment
            - nature
            - gastronomy
            - relaxation
            - shopping
            - nightlife
            - mixed
          nullable: true
        label:
          type: string
          maxLength: 200
        estimatedDurationMinutes:
          type: integer
          minimum: 1
          maximum: 1440

    CalendarPlan:
      type: object
      required:
        - id
        - userId
        - routeId
        - date
        - startTime
        - endTime
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        routeId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        title:
          type: string
          nullable: true
        place:
          allOf:
            - $ref: '#/components/schemas/CalendarPlaceInput'
            - nullable: true
        activity:
          allOf:
            - $ref: '#/components/schemas/CalendarActivityInput'
            - nullable: true
        notes:
          type: string
          nullable: true
        sourceType:
          type: string
          enum: [ manual, ai_suggested, imported ]
        relatedRecommendationIds:
          type: array
          items:
            type: string
            format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    CalendarPlanResponse:
      type: object
      required:
        - plan
      properties:
        plan:
          $ref: '#/components/schemas/CalendarPlan'

    CalendarPlanListResponse:
      type: object
      required:
        - view
        - range
        - items
        - pageInfo
      properties:
        view:
          type: string
          enum: [ day, week, month ]
        range:
          $ref: '#/components/schemas/CalendarRange'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CalendarPlan'
        pageInfo:
          $ref: '#/components/schemas/CursorPageInfo'

    CalendarRange:
      type: object
      required:
        - startDate
        - endDate
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    ActivityRecommendationRequest:
      type: object
      required:
        - location
        - availableTime
      additionalProperties: false
      properties:
        location:
          $ref: '#/components/schemas/ActivityLocationInput'
        availableTime:
          $ref: '#/components/schemas/AvailableTimeInput'
        interests:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string
            enum:
              - cultural
              - entertainment
              - nature
              - gastronomy
              - relaxation
              - shopping
              - nightlife
        budget:
          $ref: '#/components/schemas/BudgetInput'
        preferenceIds:
          type: array
          items:
            type: string
            format: uuid
        includeUserPreferences:
          type: boolean
          default: true
        routeId:
          type: string
          format: uuid
          nullable: true
        calendarPlanId:
          type: string
          format: uuid
          nullable: true
        alignWithCurrentPlan:
          type: boolean
          default: true
        dateRange:
          $ref: '#/components/schemas/DateRange'
        excludeActivityIds:
          type: array
          items:
            type: string
            format: uuid

    ActivityLocationInput:
      type: object
      additionalProperties: false
      properties:
        city:
          type: string
          maxLength: 120
        country:
          type: string
          maxLength: 120
        coordinates:
          $ref: '#/components/schemas/Coordinates'
        radiusKm:
          type: number
          minimum: 0.1
          maximum: 200

    AvailableTimeInput:
      type: object
      additionalProperties: false
      properties:
        totalMinutes:
          type: integer
          minimum: 30
          maximum: 10080
        preferredStartTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
        preferredEndTime:
          type: string
