openapi: 3.0.3

info:
  title: PLANORA API
  description: |
    PLANORA, kullanıcıların ilgi alanları, bütçesi, zaman aralığı ve gezi tarzına göre
    kişiselleştirilmiş seyahat planları, rotalar ve öneriler üretmeyi amaçlayan
    yapay zeka destekli bir seyahat planlama platformudur.

    Bu API kapsam olarak şunları içerir:
    - hesap yönetimi ve 2FA
    - profil yönetimi
    - favoriler
    - takvim planları
    - rotalar ve rota içi gezi noktaları
    - bildirimler
    - kullanıcı tercihleri
    - yapay zeka destekli öneriler ve gezi özeti
  version: 1.0.0
  contact:
    name: KUVARZ Team
    email: api@planorapp.net
    url: https://planorapp.net/contact
  license:
    name: MPL-2.0
    url: https://opensource.org/license/mpl-2-0

servers:
  - url: https://api.planorapp.net/v1
    description: Production Server
  - url: https://staging-api.planorapp.net/v1
    description: Staging Server
  - url: http://localhost:3001/v1
    description: Development Server

tags:
  - name: Auth
    description: Kayıt, giriş, 2FA, parola sıfırlama ve kullanıcı adı uygunluk akışları.
  - name: Profile
    description: Oturum açmış kullanıcının profilini görüntüleme ve güncelleme işlemleri.
  - name: Favorites
    description: Kullanıcının favori içeriklerini listeleme, ekleme ve silme işlemleri.
  - name: Calendar
    description: Takvim planı oluşturma, listeleme, detay görüntüleme, güncelleme ve silme işlemleri.
  - name: Routes
    description: Rota oluşturma, listeleme, detay görüntüleme, güncelleme ve silme işlemleri.
  - name: Route Places
    description: Rota içindeki gezi noktalarının yönetimi.
  - name: Notifications
    description: Kullanıcı bildirimlerini oluşturma, listeleme ve silme işlemleri.
  - name: Preferences
    description: Kişisel seyahat tercihlerini yönetme işlemleri.
  - name: AI
    description: AI destekli gezi, aktivite, hava durumu önerileri ve gezi özeti üretimi.

externalDocs:
  description: Proje ana dokümantasyonu
  url: ./README.md

security:
  - SessionCookie: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Yeni kullanıcı kaydı oluştur
      description: >
        Yeni bir PLANORA hesabı oluşturur. Kullanıcı adı, e-posta ve şifre ile kayıt alır.
        Bu uç nokta public'tir. Kullanıcı adı ve e-posta benzersizliği doğrulanmalıdır.
      operationId: registerUser
      security:
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              basic:
                summary: Standart kayıt isteği
                value:
                  username: ramazanbodur
                  email: ramazan@example.com
                  password: "StrongP@ssw0rd!"
                  firstName: Ramazan
                  lastName: Bodur
                  birthDate: "2003-05-14"
      responses:
        '201':
          description: Kullanıcı başarıyla oluşturuldu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
        '429':
          $ref: '#/components/responses/RateLimitedError'

  /profile:
    get:
      tags: [Profile]
      summary: Oturumdaki kullanıcının profilini getir
      description: >
        Giriş yapmış kullanıcının kendi profil bilgilerini döndürür.
        Başka kullanıcıların profiline bu uç nokta üzerinden erişilemez.
      operationId: getMyProfile
      security:
        - SessionCookie: []
      responses:
        '200':
          description: Profil başarıyla getirildi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    put:
      tags: [Profile]
      summary: Oturumdaki kullanıcının profilini güncelle
      description: >
        Giriş yapmış kullanıcının kendi profil alanlarını günceller.
        Kullanıcı yalnızca kendi verisini değiştirebilir.
      operationId: updateMyProfile
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            examples:
              basic:
                summary: Profil güncelleme
                value:
                  firstName: Ramazan
                  lastName: Bodur
                  email: ramazan@example.com
                  birthDate: "2003-05-14"
      responses:
        '200':
          description: Profil başarıyla güncellendi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'

  /auth/2fa:
    post:
      tags: [Auth]
      summary: 2FA kurulumunu başlat veya oluştur
      description: >
        Giriş yapmış kullanıcı için iki aşamalı kimlik doğrulama yöntemi tanımlar.
        Tipik akışta sunucu bir shared secret, otpauth URI ve QR bilgisi döndürür;
        kullanıcı doğrulama uygulamasıyla eşleştirdikten sonra kurulum doğrulanır.
      operationId: createTwoFactorMethod
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTwoFactorRequest'
      responses:
        '201':
          description: 2FA kurulum verisi oluşturuldu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetupResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          description: Kullanıcı için zaten etkin bir 2FA yöntemi mevcut.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'

    put:
      tags: [Auth]
      summary: Mevcut 2FA yöntemini güncelle
      description: >
        Kullanıcının mevcut 2FA yapılandırmasını değiştirir, yeniden üretir veya yeni
        yöntem ile değiştirir. Güvenlik nedeniyle mevcut oturum yanında ek doğrulama
        veya mevcut OTP kodu istenebilir.
      operationId: updateTwoFactorMethod
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTwoFactorRequest'
      responses:
        '200':
          description: 2FA yöntemi güncellendi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetupResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '428':
          $ref: '#/components/responses/FreshAuthRequiredError'
        '449':
          $ref: '#/components/responses/TwoFactorRequiredError'

  /favorites:
    get:
      tags: [Favorites]
      summary: Kullanıcının favori listesini getir
      description: >
        Oturumdaki kullanıcının kendi favori listesini döndürür.
        Liste farklı kaynak tiplerini aynı koleksiyonda barındırabilir.
      operationId: listFavorites
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/FavoriteTypeFilter'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: Favoriler başarıyla listelendi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

    post:
      tags: [Favorites]
      summary: Favori ekle
      description: >
        Bir mekanı, aktiviteyi veya gezi planını kullanıcının favori listesine ekler.
        Aynı hedefin tekrar favorilenmesi engellenebilir.
      operationId: createFavorite
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFavoriteRequest'
      responses:
        '201':
          description: Favori başarıyla oluşturuldu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/ReferencedResourceNotFoundError'
        '409':
          description: İlgili öğe zaten favorilerde mevcut.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /favorites/{favoriteId}:
    delete:
      tags: [Favorites]
      summary: Favori kaydını sil
      description: >
        Kullanıcının yalnızca kendi favori kaydını silmesine izin verir.
      operationId: deleteFavorite
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/FavoriteId'
      responses:
        '204':
          description: Favori başarıyla silindi.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/FavoriteNotFoundError'

  /ai/trip-recommendations:
    post:
      tags: [AI]
      summary: Yapay zeka destekli gezi önerileri üret
      description: >
        Kullanıcının tercihlerine, seyahat amacına, bütçesine, süresine ve destinasyonuna göre
        kapsamlı gezi önerileri üretir. Yanıtta önerilen yerler, günlük taslak plan, rota fikirleri,
        aktivite önerileri ve dikkat notları dönebilir.
      operationId: generateTripRecommendations
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripRecommendationRequest'
      responses:
        '200':
          description: Gezi önerileri başarıyla üretildi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripRecommendationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '424':
          $ref: '#/components/responses/ExternalDependencyError'
        '429':
          $ref: '#/components/responses/RateLimitedError'
        '503':
          $ref: '#/components/responses/AIProviderUnavailableError'

  # -------------------------- RB

  /auth/login:
    post:
      tags: [Auth]
      summary: Kullanıcı girişi yap
      description: >
        Kullanıcının email, parola ve gerekiyorsa 2FA kodu ile oturum açmasını sağlar.
        Başarılı girişte sunucu session cookie oluşturur.
        Email/parola doğru ancak ikinci faktör eksikse veya ayrıca isteniyorsa 2FA challenge dönebilir.
      operationId: loginUser
      security:
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              passwordOnly:
                summary: İlk adım giriş isteği
                value:
                  email: ramazan@example.com
                  password: "StrongP@ssw0rd!"
              passwordAndOtp:
                summary: 2FA kodu ile giriş
                value:
                  email: ramazan@example.com
                  password: "StrongP@ssw0rd!"
                  otpCode: "123456"
      responses:
        '200':
          description: >
            Giriş başarılı. Session cookie sunucu tarafından ayarlanır.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '202':
          description: >
            Birincil kimlik doğrulama başarılı ancak girişin tamamlanması için ikinci faktör doğrulaması gerekiyor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginRequiresTwoFactorResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationFailedError'
        '423':
          $ref: '#/components/responses/AccountLockedError'
        '429':
          $ref: '#/components/responses/RateLimitedError'

  /password-reset:
    post:
      tags: [Auth]
      summary: Şifre sıfırlama akışını başlat veya tamamla
      description: >
        Tek bir uç nokta altında şifre sıfırlama sürecinin iki fazını taşır:
        `request_reset` e-posta ile sıfırlama talebi başlatır,
        `confirm_reset` ise doğrulama tokenı/kodu ve yeni parola ile süreci tamamlar.
        Güvenlik açısından sistem, e-posta adresinin kayıtlı olup olmadığını sızdırmamak için
        istek başlatma aşamasında genel bir başarı cevabı dönebilir.
      operationId: passwordReset
      security:
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: >
            Şifre sıfırlama talebi kabul edildi. E-posta mevcutsa doğrulama adımları başlatılır.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetInitiateResponse'
        '200':
          description: Şifre başarıyla güncellendi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirmResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '410':
          $ref: '#/components/responses/ResetTokenExpiredError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'
        '429':
          $ref: '#/components/responses/RateLimitedError'

  /username-check:
    get:
      tags: [Auth]
      summary: Kullanıcı adının uygunluğunu kontrol et
      description: >
        Belirtilen kullanıcı adının kullanılabilir olup olmadığını döndürür.
        Kayıt ve profil güncelleme akışlarında kullanılabilir.
      operationId: checkUsernameAvailability
      security:
        - {}
      parameters:
        - $ref: '#/components/parameters/UsernameQuery'
      responses:
        '200':
          description: Kullanıcı adı uygunluk sonucu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsernameCheckResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitedError'

  /calendar:
    post:
      tags: [Calendar]
      summary: Rota bağlantılı takvim planı oluştur
      description: >
        Kullanıcının belirli bir rota kapsamında gün ve saat bazlı takvim planı oluşturmasını sağlar.
        Plan; mekan, aktivite, saat aralığı, notlar ve AI öneri referansları içerebilir.
        Kullanıcı yalnızca kendi hesabına ait route'lar için plan oluşturabilir.
      operationId: createCalendarPlan
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCalendarPlanRequest'
      responses:
        '201':
          description: Takvim planı oluşturuldu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarPlanResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/RouteNotFoundError'
        '409':
          $ref: '#/components/responses/CalendarConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'

    get:
      tags: [Calendar]
      summary: Takvim planlarını listele
      description: >
        Kullanıcının kendi takvim planlarını gün, hafta veya ay bazında görüntüler.
        İstenirse belirli bir route'a göre filtrelenebilir.
      operationId: listCalendarPlans
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/CalendarView'
        - $ref: '#/components/parameters/CalendarDate'
        - $ref: '#/components/parameters/CalendarFrom'
        - $ref: '#/components/parameters/CalendarTo'
        - $ref: '#/components/parameters/CalendarRouteId'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: Takvim planları listelendi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarPlanListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /calendar/{planId}:
    get:
      tags: [Calendar]
      summary: Belirli bir takvim planını görüntüle
      description: >
        Kullanıcının yalnızca kendi takvim planı detayına erişmesini sağlar.
        Plan; tarih, saat, mekan, aktivite, notlar ve varsa AI öneri referanslarını içerebilir.
      operationId: getCalendarPlan
      security:
        - SessionCookie: []
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '200':
          description: Takvim planı detayı getirildi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarPlanResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/CalendarPlanNotFoundError'

    put:
      tags: [Calendar]
      summary: Takvim planını güncelle
      description: >
        Kullanıcı kendi takvim planında tarih, saat, aktivite, mekan, not veya bağlı rota
        gibi alanları güncelleyebilir.
      operationId: updateCalendarPlan
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/PlanId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCalendarPlanRequest'
      responses:
        '200':
          description: Takvim planı güncellendi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarPlanResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/CalendarPlanNotFoundError'
        '409':
          $ref: '#/components/responses/CalendarConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleViolationError'

    delete:
      tags: [Calendar]
      summary: Takvim planını sil
      description: >
        Kullanıcının yalnızca kendi takvim planını silmesine izin verir.
        Silinen kayıt ilgili takvim görünümünden kaldırılır.
      operationId: deleteCalendarPlan
      security:
        - SessionCookie: []
          CsrfToken: []
      parameters:
        - $ref: '#/components/parameters/PlanId'
      responses:
        '204':
          description: Takvim planı silindi.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/CalendarPlanNotFoundError'

  /ai/activity-recommendations:
    post:
      tags: [AI]
      summary: Yapay zeka destekli aktivite önerileri üret
      description: >
        Kullanıcının ilgi alanları, bütçe aralığı, seyahat süresi, konum bilgisi ve geçmiş
        tercihlerine göre kişiselleştirilmiş aktivite önerileri üretir.
        İstenirse mevcut route ve takvim planları ile uyum dikkate alınır.
      operationId: generateActivityRecommendations
      security:
        - SessionCookie: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityRecommendationRequest'
      responses:
        '200':
          description: Aktivite önerileri üretildi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityRecommendationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/RouteNotFoundError'
        '424':
          $ref: '#/components/responses/ExternalDependencyError'
        '429':
          $ref: '#/components/responses/RateLimitedError'
        '503':
          $ref: '#/components/responses/AIProviderUnavailableError'

  # ------------------------- ZA

  /route:
    get:
      tags: [ Routes ]
      summary: Kullanıcının rota kayıtlarını listele
      description: >
        Giriş yapmış kullanıcının kendi oluşturduğu rota kayıtlarını listeler.
        Liste görünümünde rota başlığı, destinasyon, durum, tahmini süre, durak sayısı
        ve varsa takvim bağlantı özeti gibi bilgiler dönebilir.
      operationId: listRoutes
      security:
        - SessionCookie: [ ]
      parameters:
        - $ref: '#/components/parameters/RouteStatusFilter'
        - $ref: '#/components/parameters/RouteDestinationCityFilter'
        - $ref: '#/components/parameters/RouteFromDate'
        - $ref: '#/components/parameters/RouteToDate'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: Rota listesi başarıyla getirildi.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteListResponse'
        '400':
