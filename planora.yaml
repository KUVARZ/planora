          type: string
          format: date-time
          nullable: true

    RoutePlaceResponse:
      type: object
      required:
        - place
      properties:
        place:
          $ref: '#/components/schemas/RoutePlace'

    TripSummaryRequest:
      type: object
      required:
        - routeId
        - tripStateContext
      additionalProperties: false
      properties:
        routeId:
          type: string
          format: uuid
        tripStateContext:
          type: string
          enum:
            - planned
            - completed
        placeIds:
          type: array
          description: >
            Özetin belirli gezi noktalarıyla sınırlandırılması isteniyorsa kullanılabilir.
          items:
            type: string
            format: uuid
        calendarPlanIds:
          type: array
          items:
            type: string
            format: uuid
        includeRouteNotes:
          type: boolean
          default: true
        includePlaceNotes:
          type: boolean
          default: true
        includeActivityContext:
          type: boolean
          default: true
        includeDurations:
          type: boolean
          default: true
        includeHighlights:
          type: boolean
          default: true
        summaryStyle:
          type: string
          enum:
            - concise
            - detailed
            - shareable
            - storytelling
          default: shareable
        language:
          type: string
          default: tr-TR
        audience:
          type: string
          enum:
            - self
            - friends
            - public
          default: self
        extraPrompt:
          type: string
          maxLength: 2000
          description: Özet tonunu veya odağını yönlendirmek için ek istem.

    TripSummaryResponse:
      type: object
      required:
        - summaryId
        - routeId
        - title
        - summaryText
        - timeline
        - highlights
        - stats
        - meta
      properties:
        summaryId:
          type: string
          format: uuid
        routeId:
          type: string
          format: uuid
        title:
          type: string
        summaryText:
          type: string
        shareableExcerpt:
          type: string
          nullable: true
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/TripSummaryTimelineItem'
        highlights:
          type: array
          items:
            $ref: '#/components/schemas/TripSummaryHighlight'
        stats:
          $ref: '#/components/schemas/TripSummaryStats'
        meta:
          $ref: '#/components/schemas/AIGenerationMeta'

    TripSummaryTimelineItem:
      type: object
      required:
        - order
        - label
      properties:
        order:
          type: integer
          minimum: 1
        dayNumber:
          type: integer
          minimum: 1
          nullable: true
        time:
          type: string
          nullable: true
        label:
          type: string
        category:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        durationMinutes:
          type: integer
          minimum: 1
          nullable: true

    TripSummaryHighlight:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        relatedPlaceId:
          type: string
          format: uuid
          nullable: true
        sentiment:
          type: string
          enum:
            - positive
            - neutral
            - mixed
          nullable: true

    TripSummaryStats:
      type: object
      properties:
        totalPlaces:
          type: integer
          minimum: 0
        totalActivities:
          type: integer
          minimum: 0
        totalPlannedMinutes:
          type: integer
          minimum: 0
        noteCount:
          type: integer
          minimum: 0
        coveredDays:
          type: integer
          minimum: 0

